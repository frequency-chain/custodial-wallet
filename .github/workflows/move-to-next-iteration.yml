name: Move to Next Iteration

on:
  # XXX Trigger manually for testing
  workflow_dispatch:
  schedule:
    # Runs "at 5am daily" (see https://crontab.guru)
    - cron: "0 5 * * *"
  # XXX - Test only, run every 5 mins
  # - cron: "*/5 * * * *"

jobs:
  move-to-next-iteration:
    name: Move to Next Iteration
    runs-on: ubuntu-22.04

    steps:
      - uses: blombard/move-to-next-iteration@v0.6.1
        with:
          owner: ProjectLibertyLabs
          number: 19
          token: ${{ secrets.SAAS_GITHUB_PROJECTS }}
          iteration-field: iteration
          iteration: last
          new-iteration: current
          excluded-statuses: "Done"
