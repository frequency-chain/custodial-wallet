wallet.passkey.phrase.button = View Recovery Phrase

# Wallet Confirm Page
wallet.passkey.confirm.desktop-splash = A seed phrase is a series of words that acts as a backup to access your digital wallet. Keep it offline, secure, and never share it to protect your funds and data.
