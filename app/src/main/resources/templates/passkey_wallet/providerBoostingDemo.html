<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0" />
  <title>Provider Boosting</title>

  <!-- Scripts -->
  <script th:src="@{~/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{~/js/common.js}"></script>
  <script th:src="@{~/js/bundle/errorsBundle.js}"></script>
  <script th:src="@{~/js/materialize.js}"></script>

  <script th:src="@{~/js/bundle/passkeyTransactionBundle.js}"></script>
  <script>
    const clientProvider = PASSKEY_WALLET.getPasskeyWalletClientProvider("[[${props.frequencyAddress}]]")

    // Dump the current state of the chain into the console on page load
    PASSKEY_WALLET.checkBoostStatus(clientProvider)

    function boostProvider(msaId) {
      console.log(`Boosting provider ${msaId}`)
      ERRORS.runCatchingAsync(async () => {
          await PASSKEY_WALLET.boostProvider(clientProvider, msaId, 1000000)
        },
        ERRORS.LOGGING_ERROR_HANDLER("PROVIDER_BOOST_DEMO"),
      )
    }

    function removeBoost(msaId) {
      console.log(`Removing boost from provider ${msaId}`)
      ERRORS.runCatchingAsync(async () => {
          await PASSKEY_WALLET.unstakeFromProvider(clientProvider, msaId, 1000000)
        },
        ERRORS.LOGGING_ERROR_HANDLER("PROVIDER_BOOST_DEMO"),
      )
    }

    function claimRewards() {
      console.log("Claiming rewards...")
      ERRORS.runCatchingAsync(async () => {
          await PASSKEY_WALLET.claimRewards(clientProvider)
        },
        ERRORS.LOGGING_ERROR_HANDLER("PROVIDER_BOOST_DEMO"),
      )
    }
  </script>
</head>
<body>
<h1>Provider Boosting</h1>

<!-- For each provider -->
<div th:each="provider : ${props.providers}">
  <div style="margin-bottom: 1.5em; border: 1px solid #ccc; padding: 1em;">
    <p><strong>Provider Name:</strong> <span th:text="${provider.providerName}">Placeholder Provider Name</span></p>
    <p><strong>Provider MSA ID:</strong> <span th:text="${provider.providerMsaId}">123</span></p>

    <!-- Button to boost provider -->
    <button type="button" th:onclick="'boostProvider(' + ${provider.providerMsaId} + ')'">
      Boost Provider
    </button>

    <!-- Button to remove boost from provider -->
    <button type="button" th:onclick="'removeBoost(' + ${provider.providerMsaId} + ')'">
      Remove Boost
    </button>
  </div>
</div>

<button type="button" onclick="claimRewards()">Claim Rewards</button>

</body>
</html>
