<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0" />
  <title>Community Rewards</title>

  <!-- Scripts -->
  <script th:src="@{~/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{~/js/common.js}"></script>
  <script th:src="@{~/js/bundle/errorsBundle.js}"></script>
  <script th:src="@{~/js/materialize.js}"></script>

  <script>
    function optIn() {
      ERRORS.runCatchingAsync(async () => {
          await $.ajax({
            url: `${amplicaServerAddress}/api/rewards/optIn`,
            type: 'POST'
          }).then(response => {
            console.log(response)
            document.getElementById("success-text").hidden = false
          }).catch(() => {
            alert("Operation failed! Please try again.")
          });
        },
        ERRORS.LOGGING_ERROR_HANDLER("COMMUNITY_REWARDS_DEMO"),
      )
    }

  </script>
</head>
<body>
<h1>Community Rewards</h1>
<p>Would you like to participate in the community rewards program?</p>

<button type="button" data-testid="opt-in-button" onclick="optIn()">Accept</button>
<p id="success-text" hidden data-testid="success-text">Success!</p>

</body>
</html>
