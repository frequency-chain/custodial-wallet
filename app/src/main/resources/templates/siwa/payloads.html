<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Sign in with Access Permissions</title>
  <meta name="description" content="Signing up with Frequency Access is the gateway to the Social Web.">

  <th:block th:replace="~{siwa/components/siwaScripts :: siwaScripts}"></th:block>
  <th:block th:replace="~{siwa/components/payloads/claimHandle :: claimHandleScript}"></th:block>
  <script>

    const claimHandle = "[[${props.claimHandle}]]" === "true"
    let handleSatisfied = !claimHandle

    $(function() {
      const submitButton = $("#payloads-submit")
      const submitForm = $("#payloads-form")
      function checkSubmitButton() {
        if (handleSatisfied) {
          enableButton(submitButton)
        } else {
          disableButton(submitButton)
        }
      }

      if(claimHandle) {
        doOnHandleInput(() => {
          handleSatisfied = isProperHandle();
          checkSubmitButton()
        });
      }

      submitForm.on("submit", () => {
        disableButton(submitButton)
        matomoHelper.trackEvent("payload submit")
      });

      // Initial load check for submit enable
      checkSubmitButton()
    });
  </script>
</head>
<body th:with="template='payloads',splashText=${#messages.msg('siwa.start.desktop-splash', props.providerName)}">
  <div th:replace="~{siwa/components/siwaPageOutline :: siwaPageOutline}"></div>
</body>
</html>
