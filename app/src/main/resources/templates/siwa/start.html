<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in with Access Start</title>
  <meta name="description" content="Signing up with Frequency Access is the gateway to the Social Web.">
  <meta
          name="description"
          http-equiv="Content-Security-Policy"
          th:content=
          "|style-src 'self' https://fonts.googleapis.com https://hcaptcha.com https://*.hcaptcha.com 'unsafe-eval' 'unsafe-inline';
          script-src 'self' https://hcaptcha.com https://*.hcaptcha.com https://*.matomo.cloud ${matomo.url} http://*.sentry.io 'unsafe-eval' 'unsafe-inline';
          frame-src 'self' https://hcaptcha.com https://*.hcaptcha.com 'unsafe-eval' 'unsafe-inline';
          connect-src 'self' https://hcaptcha.com https://*.hcaptcha.com https://*.matomo.cloud ${matomo.url} http://*.sentry.io 'unsafe-eval' 'unsafe-inline'|"
  />
  <th:block th:insert="~{siwa/components/siwaScripts :: siwaScripts}"></th:block>
  <th:block th:insert="~{components/phoneForm :: phoneFormScript}"></th:block>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <script th:inline="javascript">
    $(async function() {

      const emailForm = $("#email-start-form")
      const emailInput = $("#email-address")
      const emailSubmitButton = $("#email-submit-button")
      const smsForm = $("#sms-start-form")
      const smsSubmitButton = $("#sms-submit-button")
      const phoneInput = $("#phoneForm")

      function isValidPhoneNumber() {
        const phoneInputInstance = window.intlTelInput.getInstance(document.querySelector('#phoneForm'));
        let isValid
        /*[# th:if="${env.type != 'main'}"]*/
        isValid = isLikelyValidSms(phoneInputInstance.getNumber())
        /*[/]*/ /*[# th:unless="${env.type != 'main'}"]*/
        isValid = phoneInputInstance.isValidNumber()
        /*[/]*/
        return isValid
      }

      emailInput.on("input", () => {
        if(isLikelyValidEmail(emailInput.val())) {
          enableButton(emailSubmitButton)
        } else {
          disableButton(emailSubmitButton)
        }
      });

      phoneInput.on("input", () => {
        if(isValidPhoneNumber()) {
          enableButton(smsSubmitButton)
        } else {
          disableButton(smsSubmitButton)
        }
      });

      smsForm.on("submit", () => {
        matomoHelper.trackEvent("sms submit")
        disableButton(smsSubmitButton)
        const phoneInputInstance = window.intlTelInput.getInstance(document.querySelector('#phoneForm'));
        const sms = phoneInputInstance.getNumber()
        $("#sms-identifier").val(sms)
      });

      emailForm.on("submit", () => {
        matomoHelper.trackEvent("email submit")
        disableButton(emailSubmitButton)
      });
    });
  </script>
</head>
<body th:with="template='start',splashText=${#messages.msg('siwa.start.desktop-splash', props.providerName)}">
  <div th:replace="~{siwa/components/siwaPageOutline :: siwaPageOutline}"></div>
</body>
</html>
