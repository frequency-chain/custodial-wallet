<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="passkey-wallet-finished" th:fragment="passkeyFinished">
    <div class="center-align">
        <img class="passkey-wallet-checkmark center-align padding-bottom-16" th:src="@{~/img/checkmark_v2.svg}" alt="Frequency checkmark" style="width:25%;">
        <div class="passkey-wallet-text margin-bottom-24">
            <p data-th-text="#{wallet.passkey.finished.text}"></p>
        </div>
    </div>
    <div class="padding-vertical-16 center-align">
        <a th:href="${props.redirect}" id="passkey-finished-submit" class="btn waves-effect waves-light full-width"
           data-testid="passkey-finished-submit" data-th-text="#{wallet.passkey.finished.button}">
        </a>
    </div>
</div>
</body>
</html>
