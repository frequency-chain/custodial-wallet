<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main class="passkey-create-wallet" th:fragment="passkeyWalletPage">
    <div th:switch="${props.recoveryFlow}">
        <div th:case="true">
            <div id="wallet-recovery-page">
                <div th:replace="~{siwa/pages/passkey_wallet/walletRecovery :: walletRecovery}"></div>
            </div>
        </div>
        <div th:case="false">
            <div id="wallet-phrase-page">
                <div th:replace="~{siwa/pages/passkey_wallet/walletPhrase :: walletPhrase}"></div>
            </div>
            <div id="iframe-modal-page">
                <div th:replace="~{siwa/components/iframeModal :: iframeModal}"></div>
            </div>
        </div>
    </div>

    <div id="wallet-confirm-page" hidden>
        <div th:replace="~{siwa/pages/passkey_wallet/walletConfirm :: walletConfirm}"></div>
    </div>
    <div id="passkey-create-page" hidden>
        <div th:replace="~{siwa/pages/passkey_wallet/passkeyCreate :: passkeyCreate}"></div>
    </div>
    <div id="passkey-finished-page" hidden>
        <div th:replace="~{siwa/pages/passkey_wallet/passkeyFinished :: passkeyFinished}"></div>
    </div>
    <div th:replace="~{siwa/components/siwaErrorModal :: siwaErrorModal}"></div>
</main>
</body>
</html>
